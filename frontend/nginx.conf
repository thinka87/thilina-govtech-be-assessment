server {
    listen       80;
    server_name  _;
    root         /usr/share/nginx/html;
    index        index.html;

    # ── Compression ───────────────────────────────────────────────────────────
    gzip            on;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_proxied    any;
    gzip_vary       on;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/json
        application/javascript
        application/x-javascript
        image/svg+xml;

    # ── Static asset caching ──────────────────────────────────────────────────
    # Vite hashes all asset filenames — safe to cache permanently.
    location ~* \.(?:js|css|woff2?|ttf|eot|svg|ico|png|jpg|jpeg|gif|webp)$ {
        expires       1y;
        add_header    Cache-Control "public, immutable";
        access_log    off;
    }

    # ── index.html — must NOT be cached (controls cache-busting) ─────────────
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma        "no-cache";
        add_header Expires       "0";
    }

    # ── SPA fallback ──────────────────────────────────────────────────────────
    # All unmatched paths serve index.html so React Router handles routing.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
