server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: govtech-platform

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/govtech_db}
    username: ${DB_USERNAME:govtech}
    password: ${DB_PASSWORD:govtech123}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_schema: public
        jdbc:
          time_zone: Asia/Colombo

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    fail-on-missing-locations: false

  # Jackson: serialize LocalDateTime as ISO-8601 string, not Unix timestamp
  jackson:
    serialization:
      write-dates-as-timestamps: false
    date-format: "yyyy-MM-dd'T'HH:mm:ss"
    time-zone: Asia/Colombo
    default-property-inclusion: non_null

# JWT configuration
# Production: set JWT_SECRET to a strong, randomly generated 32+ character value
# via an environment variable or secrets manager. Never commit the real secret.
app:
  security:
    jwt:
      secret: ${JWT_SECRET:change-this-secret-key-for-local-development-only}
      expiration-ms: ${JWT_EXPIRATION_MS:86400000}   # 24 hours in milliseconds

# Swagger / OpenAPI
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
    display-request-duration: true
    try-it-out-enabled: true

logging:
  level:
    com.govtech.platform: DEBUG
    org.springframework.security: INFO
    org.flywaydb: INFO
